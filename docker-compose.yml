version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fastapi-net

  app:
    build: .
    container_name: fastapi-app
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:root@postgres-db:5432/postgres
    depends_on:
      - db
    volumes:
      - /mnt/c/Users/Srinivas/Desktop/project:/app
    networks:
      - fastapi-net

networks:
  fastapi-net:

volumes:
  postgres-data: